# fly.toml — Fly.io deployment config for ADAP Content Gen Web
# Replace "adap-content-gen-web" with your chosen app name before deploying.

app = "adap-content-gen-web"
primary_region = "lax"   # Los Angeles — closest to US West Coast; change as needed

[build]

[env]
  PORT = "8080"
  DATABASE_PATH = "/data/adap.db"
  # Set secrets (never put real keys here):
  # flyctl secrets set FLASK_SECRET_KEY=...
  # flyctl secrets set ANTHROPIC_API_KEY=sk-ant-...
  # flyctl secrets set OPENAI_API_KEY=sk-...
  # flyctl secrets set LLM_PROVIDER=anthropic

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Persistent volume for SQLite database + output files
[[mounts]]
  source = "adap_data"
  destination = "/data"
  initial_size = "5gb"
